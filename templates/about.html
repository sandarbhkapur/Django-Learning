{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    {% if about %}

        <h1>{{ about.title }}</h1>

        {% if about.image %}
            <img src="{{ about.image.url }}"
                 class="img-fluid rounded mb-3">
        {% endif %}

        <p>{{ about.short_description }}</p>

        <div>
            {{ about.description|linebreaks }}
        </div>

    {% else %}

        <h1>About Us</h1>
        <p>No content available.</p>

    {% endif %}

</div>

{% endblock %}
